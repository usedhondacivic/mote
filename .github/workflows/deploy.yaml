# Simple workflow for deploying static content to GitHub Pages
name: Deploy to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: 'mote-configuration/package-lock.json'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            mote-api

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Test Book
        run: just book::test

      - name: Run CI web build
        run: just ci-web-artifact

      - name: Fetch hardware IBOM from latest release
        run: |
          LATEST_HW_TAG=$(gh release list \
            --repo "$GITHUB_REPOSITORY" \
            --json tagName \
            --jq '[.[] | select(.tagName | startswith("mote-hardware-"))] | first | .tagName' \
            2>/dev/null || echo "")
          if [ -z "$LATEST_HW_TAG" ]; then
            echo "No hardware release found, skipping IBOM"
            exit 0
          fi
          echo "Fetching IBOM from $LATEST_HW_TAG"
          mkdir -p output/hardware
          gh release download "$LATEST_HW_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'ibom.html' \
            --dir output/hardware/ \
            2>/dev/null \
            && mv output/hardware/ibom.html output/hardware/index.html \
            || echo "No IBOM in $LATEST_HW_TAG yet, skipping"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './output'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
